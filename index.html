<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="side-deco">
        <div class="l-stack"><span class="txt">Grammar</span><span class="txt">ABC</span></div>
        <div class="r-stack"><span class="txt">Verb</span><span class="txt">Noun</span></div>
    </div>

    <main id="game-deck">
        <h1 class="top-title">English Escape Room</h1>
        <div id="riddle-display">
            <h2 id="counter">Riddle 1</h2>
            <p id="prompt">Loading...</p>
            <div id="button-grid"></div>
        </div>
    </main>

    <div id="win-modal" class="ui-hidden">
        <h1>Victory! 🏆</h1>
        <p>Master of 20 Riddles</p>
        <div class="info">
            <p>Made by Kareem Aladham</p>
            <p>Class 8A - Teacher Hiba Hilal</p>
        </div>
        <button class="sys-btn" onclick="location.reload()">Replay</button>
    </div>

    <div id="fail-modal" class="ui-hidden">
        <h1>Game Over 💔</h1>
        <button class="sys-btn" onclick="location.reload()">Try Again</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
