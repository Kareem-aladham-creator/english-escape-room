<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Balanced Floating Words -->
    <div class="floating-bg">
        <div class="column-left">
            <span class="f-word c1">Grammar</span>
            <span class="f-word c2">ABC</span>
            <span class="f-word c3">Tense</span>
        </div>
        <div class="column-right">
            <span class="f-word c4">Verb</span>
            <span class="f-word c5">Noun</span>
            <span class="f-word c6">Phrase</span>
        </div>
    </div>

    <div id="main-game">
        <h1 class="project-title">English Escape Room</h1>
        
        <div id="maze-container">
            <div id="player">🏃‍♂️</div>
        </div>

        <div id="question-box">
            <h2 id="riddle-id">Riddle 1</h2>
            <p id="riddle-text">Loading...</p>
            <div id="answers"></div>
        </div>
    </div>

    <!-- Win Screen: 🏆 ONLY -->
    <div id="victory-panel" class="overlay hidden">
        <h1>Victory! 🏆</h1>
        <p>You escaped with 20/20!</p>
        <div class="credits">
            <p>Made by Kareem Aladham</p>
            <p>Teacher Hiba Hilal - Class 8A</p>
        </div>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <!-- Lose Screen: 💔 ONLY -->
    <div id="fail-panel" class="overlay hidden">
        <h1>Hard Luck 💔</h1>
        <p>One mistake and the door locked!</p>
        <button onclick="location.reload()">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
