<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <h1 class="bubble-font floating-words">English Escape Room</h1>
        
        <div id="maze-container">
            <svg id="maze-svg" viewBox="0 0 100 100">
                <path d="M 5 5 L 5 40 L 40 40 L 40 70 L 80 70 L 80 95" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" />
            </svg>
            <div id="character">🏃‍♂️</div>
        </div>

        <div id="quiz-box">
            <h2 id="riddle-title" class="bubble-font floating-words">Riddle 1</h2>
            <p id="question-text">Loading...</p>
            <div id="options-container"></div>
        </div>
    </div>

    <!-- WIN SCREEN: MULTI-FIREWORK OVERLOAD -->
    <div id="win-screen" class="hidden fullscreen">
        <div class="firework" style="left: 2%;  animation-duration: 2.1s;">🎆</div>
        <div class="firework" style="left: 12%; animation-duration: 3.5s;">✨</div>
        <div class="firework" style="left: 22%; animation-duration: 2.8s;">🎉</div>
        <div class="firework" style="left: 32%; animation-duration: 4.2s;">🎇</div>
        <div class="firework" style="left: 42%; animation-duration: 2.5s;">🎊</div>
        <div class="firework" style="left: 52%; animation-duration: 3.1s;">🎆</div>
        <div class="firework" style="left: 62%; animation-duration: 2.3s;">✨</div>
        <div class="firework" style="left: 72%; animation-duration: 3.9s;">🎉</div>
        <div class="firework" style="left: 82%; animation-duration: 2.7s;">🎇</div>
        <div class="firework" style="left: 92%; animation-duration: 3.3s;">🎊</div>
        
        <h1 class="big-win bubble-font floating-words">Winner 🎉🥇</h1>
        <button class="modern-btn" onclick="resetGame()">Play Again</button>
        <div class="credits">
            <p>Made by Kareem Aladham</p>
            <p>Teacher Hiba Hilal</p>
            <p>8A</p>
        </div>
    </div>

    <!-- LOSE SCREEN: HEARTBREAK OVERLOAD -->
    <div id="lose-screen" class="hidden fullscreen bg-red">
        <div class="heartbreak" style="left: 5%;  animation-duration: 2.4s;">💔</div>
        <div class="heartbreak" style="left: 15%; animation-duration: 3.2s;">😭</div>
        <div class="heartbreak" style="left: 25%; animation-duration: 2.1s;">💔</div>
        <div class="heartbreak" style="left: 35%; animation-duration: 4.0s;">⛈️</div>
        <div class="heartbreak" style="left: 45%; animation-duration: 2.7s;">💔</div>
        <div class="heartbreak" style="left: 55%; animation-duration: 3.5s;">😭</div>
        <div class="heartbreak" style="left: 65%; animation-duration: 2.2s;">💔</div>
        <div class="heartbreak" style="left: 75%; animation-duration: 3.8s;">⛈️</div>
        <div class="heartbreak" style="left: 85%; animation-duration: 2.9s;">💔</div>
        <div class="heartbreak" style="left: 95%; animation-duration: 3.4s;">😭</div>

        <h1 class="bubble-font floating-words">Hard Luck 💔</h1>
        <button class="modern-btn" onclick="resetGame()">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
