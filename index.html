<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room - Class 8A</title>
    
    <!-- Google Fonts: DynaPuff -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">

    <style>
        /* === THEME & LAYOUT === */
        body {
            background-color: #001122;
            color: #ffffff;
            font-family: 'DynaPuff', cursive;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.2s;
            overflow-x: hidden;
        }

        h1 {
            color: #3399ff;
            text-shadow: 0 0 10px rgba(51, 153, 255, 0.5);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        /* === MAZE BOARD === */
        .maze-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background-color: #002244;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            max-width: 320px; 
            border: 4px solid #0055ff;
        }

        .maze-cell {
            aspect-ratio: 1; 
            background-color: #004488; 
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s;
        }

        .maze-cell.active {
            background-color: #3399ff; 
            box-shadow: 0 0 20px #3399ff;
            transform: scale(1.1);
        }

        /* === GAME BOX === */
        #game-container, #end-screen {
            background-color: #002244;
            border: 3px solid #0055ff;
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 85, 255, 0.3);
        }

        .riddle-number {
            color: #66b2ff;
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .question-text {
            font-size: 24px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        button {
            font-family: 'DynaPuff', cursive;
            background-color: #004488;
            color: white;
            border: 3px solid #0055ff;
            border-radius: 12px;
            padding: 20px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #0055ff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 85, 255, 0.4);
        }

        /* === ANIMATIONS === */
        .heartbreak {
            position: fixed;
            top: 50%;
            left: 50%;
            font-size: 120px;
            transform: translate(-50%, -50%);
            animation: breakEffect 1s forwards;
            pointer-events: none;
            z-index: 1000;
        }
        @keyframes breakEffect {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(0.5); }
        }

        .firework {
            position: fixed;
            font-size: 60px;
            animation: explodeEffect 1.5s forwards;
            pointer-events: none;
            z-index: 1000;
        }
        @keyframes explodeEffect {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        .credits {
            margin-top: 30px;
            font-size: 14px;
            color: #66b2ff;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>English Escape Room</h1>
    <div class="maze-board" id="maze-board"></div>

    <div id="game-container">
        <!-- Riddle Number Display -->
        <div id="riddle-tag" class="riddle-number">Riddle 1</div>
        <div id="question-text" class="question-text">Loading...</div>
        <div id="options-container" class="options"></div>
        <div style="margin-top: 25px; color: #ff4444; font-size: 20px;">LIFE: ❤️</div>
    </div>

    <!-- End Screen -->
    <div id="end-screen" style="display: none;">
        <h2 id="end-title" style="font-size: 36px;"></h2>
        <p id="end-message" style="font-size: 20px; margin-bottom: 20px;"></p>
        <button onclick="location.reload()">TRY AGAIN</button>
    </div>

    <div class="credits">
        Made by Kareem Aladham<br>
        Class 8A - Teacher Hiba Hilal
    </div>

    <script>
        // === AUDIO SETUP ===
        const correctSound = new Audio('correct.mp3');
        const wrongSound = new Audio('wrong.mp3');

        // === 20 RIDDLES (2 OPTIONS EACH) ===
        const questions = [
            { q: "Which is a 'Noun'?", options: ["Run", "Apple"], answer: 1 },
            { q: "Past tense of 'Go'?", options: ["Went", "Gone"], answer: 0 },
            { q: "I have an eye but cannot see. What am I?", options: ["Needle", "Table"], answer: 0 },
            { q: "Which one is plural?", options: ["Child", "Children"], answer: 1 },
            { q: "Opposite of 'Difficult'?", options: ["Easy", "Soft"], answer: 0 },
            { q: "A person who teaches is a...", options: ["Student", "Teacher"], answer: 1 },
            { q: "What comes at the end of a sentence?", options: ["Comma", "Full stop"], answer: 1 },
            { q: "Which is a color?", options: ["Blue", "Blow"], answer: 0 },
            { q: "The day after Friday is...", options: ["Saturday", "Sunday"], answer: 0 },
            { q: "Which is a fruit?", options: ["Carrot", "Orange"], answer: 1 },
            { q: "I have keys but no locks. What am I?", options: ["Piano", "Door"], answer: 0 },
            { q: "Capital of England?", options: ["Paris", "London"], answer: 1 },
            { q: "A 'Verb' is an action word. Correct?", options: ["Yes", "No"], answer: 0 },
            { q: "Which is 'Bigger'?", options: ["Ant", "Elephant"], answer: 1 },
            { q: "Opposite of 'Hot'?", options: ["Cold", "Warm"], answer: 0 },
            { q: "I speak without a mouth. What am I?", options: ["Echo", "Wind"], answer: 0 },
            { q: "Which month has 'Christmas'?", options: ["November", "December"], answer: 1 },
            { q: "How many letters in 'English'?", options: ["7", "8"], answer: 0 },
            { q: "Which is a 'Vowel'?", options: ["B", "E"], answer: 1 },
            { q: "You use me to write on a board. What am I?", options: ["Chalk", "Spoon"], answer: 0 }
        ];

        let currentIdx = 0;
        const mazePath = [0,1,2,3,4,9,8,7,6,5,10,11,12,13,14,19,18,17,16,15];
        const cells = [];
        const board = document.getElementById('maze-board');

        // Initialize Maze
        for(let i=0; i<20; i++) {
            const cell = document.createElement('div');
            cell.classList.add('maze-cell');
            board.appendChild(cell);
            cells.push(cell);
        }

        function showVisualEffect(emoji, className) {
            const el = document.createElement('div');
            el.innerText = emoji;
            el.className = className;
            if(className === 'firework') {
                el.style.left = Math.random() * 90 + '%';
                el.style.top = Math.random() * 90 + '%';
            }
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        function updateGame() {
            if (currentIdx >= 20) {
                showEndScreen(true);
                return;
            }

            // Update Maze Runner
            cells.forEach(c => { c.innerHTML = ''; c.classList.remove('active'); });
            cells[mazePath[19]].innerHTML = '🏁';
            cells[mazePath[currentIdx]].classList.add('active');
            cells[mazePath[currentIdx]].innerHTML = '🏃‍♂️';

            // Update Riddle Tag
            document.getElementById('riddle-tag').innerText = `Riddle ${currentIdx + 1}`;

            const qData = questions[currentIdx];
            document.getElementById('question-text').innerText = qData.q;
            const btnBox = document.getElementById('options-container');
            btnBox.innerHTML = '';

            qData.options.forEach((text, i) => {
                const b = document.createElement('button');
                b.innerText = text;
                b.onclick = () => handleChoice(i);
                btnBox.appendChild(b);
            });
        }

        function handleChoice(choice) {
            if (choice === questions[currentIdx].answer) {
                correctSound.play();
                document.body.style.backgroundColor = "#004400"; // Green Flash
                currentIdx++;
                setTimeout(() => {
                    document.body.style.backgroundColor = "#001122";
                    updateGame();
                }, 200);
            } else {
                wrongSound.play();
                document.body.style.backgroundColor = "#440000"; // Red Flash
                showVisualEffect('💔', 'heartbreak');
                setTimeout(() => {
                    document.body.style.backgroundColor = "#001122";
                    showEndScreen(false);
                }, 400);
            }
        }

        function showEndScreen(isWin) {
            document.getElementById('game-container').style.display = 'none';
            const screen = document.getElementById('end-screen');
            screen.style.display = 'block';
            
            if (isWin) {
                document.getElementById('end-title').innerText = "🏆 YOU ESCAPED!";
                document.getElementById('end-message').innerText = "Excellent work, Class 8A!";
                for(let i=0; i<20; i++) {
                    setTimeout(() => showVisualEffect('🎆', 'firework'), i * 150);
                }
            } else {
                document.getElementById('end-title').innerText = "💀 ROOM LOCKED";
                document.getElementById('end-message').innerText = "One mistake was all it took...";
            }
        }

        updateGame();
    </script>
</body>
</html>
