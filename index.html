<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room - Class 8A</title>
    
    <!-- Google Fonts: DynaPuff -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #001122;
            color: #ffffff;
            font-family: 'DynaPuff', cursive;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.2s;
            overflow-x: hidden;
        }

        h1 {
            color: #3399ff;
            text-shadow: 0 0 10px rgba(51, 153, 255, 0.5);
            font-size: 2.5rem;
            margin-bottom: 5px;
        }

        /* === GLOWING TEXT EFFECT === */
        .glowing-title {
            color: #ffffff;
            text-shadow: 0 0 10px #3399ff, 0 0 20px #3399ff, 0 0 40px #0055ff, 0 0 80px #0055ff;
            font-size: 3.5rem;
            margin-top: 0;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .maze-board {
            display: none; /* Hidden until game starts */
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            background-color: #002244;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 20px;
            max-width: 320px; 
            border: 4px solid #0055ff;
        }

        .maze-cell {
            aspect-ratio: 1; 
            background-color: #004488; 
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            transition: all 0.3s;
        }

        .maze-cell.active {
            background-color: #3399ff; 
            box-shadow: 0 0 20px #3399ff;
            transform: scale(1.1);
        }

        /* Shared Box Style for all screens */
        #start-screen, #game-container, #end-screen {
            background-color: #002244;
            border: 3px solid #0055ff;
            border-radius: 20px;
            padding: 30px;
            max-width: 550px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0, 85, 255, 0.3);
        }

        #game-container, #end-screen {
            display: none; /* Hidden initially */
        }

        .riddle-number {
            color: #66b2ff;
            font-size: 1.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .question-text {
            font-size: 22px;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        /* Main Buttons (Answers & Start) */
        button {
            font-family: 'DynaPuff', cursive;
            background-color: #004488;
            color: white;
            border: 3px solid #0055ff;
            border-radius: 12px;
            padding: 20px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: #0055ff;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 85, 255, 0.4);
        }

        /* Smaller Restart Button */
        .restart-btn {
            background-color: #222;
            border: 2px solid #555;
            padding: 10px 20px;
            font-size: 14px;
            margin-top: 25px;
            color: #aaa;
        }

        .restart-btn:hover {
            background-color: #ff4444;
            border-color: #cc0000;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 68, 68, 0.4);
        }

        .heartbreak {
            position: fixed;
            top: 50%; left: 50%;
            font-size: 120px;
            transform: translate(-50%, -50%);
            animation: breakEffect 1s forwards;
            pointer-events: none;
        }
        @keyframes breakEffect {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -120%) scale(0.5); }
        }

        .firework {
            position: fixed;
            font-size: 60px;
            animation: explodeEffect 1.5s forwards;
            pointer-events: none;
        }
        @keyframes explodeEffect {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }

        .credits {
            margin-top: 30px;
            font-size: 14px;
            color: #66b2ff;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>English Escape Room</h1>
    
    <!-- THE MAZE -->
    <div class="maze-board" id="maze-board"></div>

    <!-- START SCREEN -->
    <div id="start-screen">
        <h2 class="glowing-title">Welcome!</h2>
        <p style="font-size: 20px; margin-bottom: 30px; color: #b3d9ff;">Solve 20 riddles to escape. One mistake locks the door forever.</p>
        <button onclick="startGame()" style="font-size: 24px; padding: 20px 40px;">START GAME</button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-container">
        <div id="riddle-tag" class="riddle-number">Riddle 1</div>
        <div id="question-text" class="question-text">Loading...</div>
        <div id="options-container" class="options"></div>
        <div style="margin-top: 25px; color: #ff4444; font-size: 20px;">LIFE: ❤️</div>
        
        <!-- Restart Button placed inside the game box -->
        <button class="restart-btn" onclick="restartToStart()">RESTART LEVEL</button>
    </div>

    <!-- END SCREEN -->
    <div id="end-screen">
        <h2 id="end-title" style="font-size: 36px; margin-top: 0;"></h2>
        <p id="end-message" style="font-size: 20px; margin-bottom: 25px;"></p>
        <button onclick="restartToStart()">TRY AGAIN</button>
    </div>

    <div class="credits">
        Made by Kareem Aladham<br>
        Class 8A - Teacher Hiba Hilal
    </div>

    <script>
        const correctSound = new Audio('correct.mp3');
        const wrongSound = new Audio('wrong.mp3');

        const questions = [
            { q: "Which is a 'Noun'?", options: ["Run", "Apple"], answer: 1 },
            { q: "Past tense of 'Go'?", options: ["Went", "Gone"], answer: 0 },
            { q: "Who is responsible for the broken window?", options: ["Who", "Whom"], answer: 0 },
            { q: "Which one is plural?", options: ["Child", "Children"], answer: 1 },
            { q: "Which sentence follows pronoun-antecedent agreement?", options: ["Every student must bring their own laptop.", "Every student must bring his or her own laptop."], answer: 1 },
            { q: "Choose the correct pronoun: 'Either Sarah or Jane will lend you ___ notes.'", options: ["Their", "Her"], answer: 1 },
            { q: "Which sentence avoids a double negative?", options: ["I don't have no time for games.", "I can hardly wait for the holidays."], answer: 1 },
            { q: "What is the correct possessive form for a single cat that owns a toy?", options: ["The cat's toy", "The cats' toy"], answer: 0 },
            { q: "The house lost ___ roof in the storm.", options: ["It's", "Its"], answer: 1 },
            { q: "Complete the sentence: 'Neither of the boys brought ___ lunch.'", options: ["His", "Their"], answer: 0 },
            { q: "Correct possessive form for 'children':", options: ["Children's", "Childrens'"], answer: 0 },
            { q: "Many of the hikers found ___ way back.", options: ["Their", "His"], answer: 0 },
            { q: "A 'Verb' is an action word. Correct?", options: ["Yes", "No"], answer: 0 },
            { q: "Complete this sentence: 'Is that bag ___?'", options: ["Your", "Yours"], answer: 1 },
            { q: "How should you form the possessive of 'babies' (plural)?", options: ["Babies'", "Baby's"], answer: 0 },
            { q: "Most of the students had ___ chance to see the document.", options: ["Their", "His"], answer: 0 },
            { q: "Most of the students had ___ chance to see the document.", options: ["Their", "His or Her"], answer: 0 },
            { q: "George Washington and James Madison signed the Constitution. ___ became presidents.", options: ["They", "Them"], answer: 0 },
            { q: "Which is a 'Vowel'?", options: ["B", "E"], answer: 1 },
            { q: "Is there a double negative in: 'Nobody knows more about that glass than Dr. Franks'?", options: ["No", "Yes"], answer: 0 }
        ];

        let currentIdx = 0;
        const mazePath = [0,1,2,3,4,9,8,7,6,5,10,11,12,13,14,19,18,17,16,15];
        const cells = [];
        const board = document.getElementById('maze-board');

        for(let i=0; i<20; i++) {
            const cell = document.createElement('div');
            cell.classList.add('maze-cell');
            board.appendChild(cell);
            cells.push(cell);
        }

        function showVisualEffect(emoji, className) {
            const el = document.createElement('div');
            el.innerText = emoji;
            el.className = className;
            if(className === 'firework') {
                el.style.left = Math.random() * 90 + '%';
                el.style.top = Math.random() * 90 + '%';
            }
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1200);
        }

        // --- NEW START & RESTART LOGIC ---
        function startGame() {
            currentIdx = 0;
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('end-screen').style.display = 'none';
            
            // Show Game and Maze
            document.getElementById('maze-board').style.display = 'grid';
            document.getElementById('game-container').style.display = 'block';
            
            updateGame();
        }

        function restartToStart() {
            // Hide Game, End Screen, and Maze
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('end-screen').style.display = 'none';
            document.getElementById('maze-board').style.display = 'none';
            
            // Show Start Screen and reset background color
            document.getElementById('start-screen').style.display = 'block';
            document.body.style.backgroundColor = "#001122";
        }
        // ---------------------------------

        function updateGame() {
            if (currentIdx >= 20) {
                showEndScreen(true);
                return;
            }
            cells.forEach(c => { c.innerHTML = ''; c.classList.remove('active'); });
            cells[mazePath[19]].innerHTML = '🏁';
            cells[mazePath[currentIdx]].classList.add('active');
            cells[mazePath[currentIdx]].innerHTML = '🏃‍♂️';
            
            document.getElementById('riddle-tag').innerText = `Riddle ${currentIdx + 1}`;
            const qData = questions[currentIdx];
            document.getElementById('question-text').innerText = qData.q;
            const btnBox = document.getElementById('options-container');
            btnBox.innerHTML = '';
            
            qData.options.forEach((text, i) => {
                const b = document.createElement('button');
                b.innerText = text;
                b.onclick = () => handleChoice(i);
                btnBox.appendChild(b);
            });
        }

        function handleChoice(choice) {
            if (choice === questions[currentIdx].answer) {
                correctSound.play();
                document.body.style.backgroundColor = "#004400";
                currentIdx++;
                setTimeout(() => {
                    document.body.style.backgroundColor = "#001122";
                    updateGame();
                }, 200);
            } else {
                wrongSound.play();
                document.body.style.backgroundColor = "#440000";
                showVisualEffect('💔', 'heartbreak');
                setTimeout(() => {
                    document.body.style.backgroundColor = "#001122";
                    showEndScreen(false);
                }, 400);
            }
        }

        function showEndScreen(isWin) {
            document.getElementById('game-container').style.display = 'none';
            const screen = document.getElementById('end-screen');
            screen.style.display = 'block';
            if (isWin) {
                document.getElementById('end-title').innerText = "🏆 YOU ESCAPED!";
                document.getElementById('end-message').innerText = "Excellent work, Kareem and Class 8A!";
                for(let i=0; i<20; i++) {
                    setTimeout(() => showVisualEffect('🎆', 'firework'), i * 150);
                }
            } else {
                document.getElementById('end-title').innerText = "💀 ROOM LOCKED";
                document.getElementById('end-message').innerText = "One mistake was all it took...";
            }
        }
    </script>
</body>
</html>
