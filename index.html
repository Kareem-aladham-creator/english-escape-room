<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Balanced Floating Words -->
    <div class="background-elements">
        <div class="float-side left-side">
            <span class="word w1">Grammar</span>
            <span class="word w2">ABC</span>
            <span class="word w3">Tense</span>
        </div>
        <div class="float-side right-side">
            <span class="word w4">Verb</span>
            <span class="word w5">Noun</span>
            <span class="word w6">Phrase</span>
        </div>
    </div>

    <div id="game-container">
        <h1 class="main-title">English Escape Room</h1>
        
        <div id="maze-box">
            <div id="runner">🏃‍♂️</div>
        </div>

        <div id="quiz-area">
            <h2 id="riddle-header">Riddle 1</h2>
            <p id="question-text">Loading...</p>
            <div id="btn-group"></div>
        </div>
    </div>

    <!-- Win Screen: 🏆 ONLY -->
    <div id="win-screen" class="screen hidden">
        <h1 class="victory-text">Victory! 🏆</h1>
        <p>You mastered 20 riddles!</p>
        <div class="credits">
            <p>Made by Kareem Aladham</p>
            <p>Teacher Hiba Hilal - 8A</p>
        </div>
        <button class="retry-btn" onclick="location.reload()">Play Again</button>
    </div>

    <!-- Lose Screen: 💔 ONLY -->
    <div id="lose-screen" class="screen hidden">
        <h1 class="fail-text">Hard Luck 💔</h1>
        <p>One mistake ended the escape!</p>
        <button class="retry-btn" onclick="location.reload()">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
