<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Balanced Floating Words -->
    <div class="bg-layer">
        <div class="col-left">
            <span class="f-word">Grammar</span>
            <span class="f-word">ABC</span>
            <span class="f-word">Tense</span>
        </div>
        <div class="col-right">
            <span class="f-word">Verb</span>
            <span class="f-word">Noun</span>
            <span class="f-word">Phrase</span>
        </div>
    </div>

    <div id="game-ui">
        <h1 class="main-title">English Escape Room</h1>
        
        <div id="maze-viz">
            <div id="player-sprite">🏃‍♂️</div>
        </div>

        <div id="quiz-container">
            <h2 id="riddle-header">Riddle 1</h2>
            <p id="riddle-prompt">Loading...</p>
            <div id="btn-container"></div>
        </div>
    </div>

    <!-- Victory Screen (NO Heartbreak) -->
    <div id="win-panel" class="modal hidden">
        <h1>Victory! 🏆</h1>
        <p>You mastered 20 riddles!</p>
        <div class="credits">
            <p>Made by Kareem Aladham</p>
            <p>Class 8A - Teacher Hiba Hilal</p>
        </div>
        <button class="retry-btn" onclick="location.reload()">Play Again</button>
    </div>

    <!-- Fail Screen (💔 ONLY) -->
    <div id="lose-panel" class="modal hidden">
        <h1>Hard Luck 💔</h1>
        <p>The escape failed!</p>
        <button class="retry-btn" onclick="location.reload()">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
