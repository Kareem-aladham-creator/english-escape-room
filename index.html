<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room - Class 8A</title>
    
    <!-- This line magically links to your separate CSS file! -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>English Escape Room</h1>
    <p style="color: #66b2ff; margin-bottom: 20px;">Solve the 20 riddles to escape!</p>

    <!-- The Running Man Maze -->
    <div class="maze-board" id="maze-board"></div>

    <!-- The Game Box -->
    <div id="game-container">
        <div id="question-text" class="question fade-in">Loading question...</div>
        <div id="options-container" class="options fade-in"></div>
        
        <div class="stats">
            <span id="progress-text">Question: 1/20</span>
            <span id="lives-text">Lives: ❤️❤️❤️</span>
        </div>
    </div>

    <!-- Win Screen -->
    <div id="win-screen">
        <h2>🎉 You Escaped! 🎉</h2>
        <p>Incredible job! You solved all 20 English riddles.</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <!-- Lose Screen -->
    <div id="lose-screen">
        <h2>Game Over</h2>
        <p>You ran out of lives. The room is locked!</p>
        <button onclick="location.reload()">Try Again</button>
    </div>

    <div class="credits">
        Project by Kareem Aladham<br>
        Class 8A - Teacher Hiba Hilal
    </div>

    <!-- This line magically links to your separate JavaScript file! -->
    <script src="script.js"></script>
</body>
</html>
