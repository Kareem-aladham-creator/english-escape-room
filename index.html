<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Floating Background Words -->
    <div class="floating-container">
    <span class="f-word left w1">Grammar</span>
    <span class="f-word left w2">ABC</span>
    <span class="f-word left w3">Tense</span>
    <span class="f-word right w4">Verb</span>
    <span class="f-word right w5">Noun</span>
    <span class="f-word right w6">Phrase</span>
</div>
    <div id="game-wrapper">
        <h1 class="game-title">English Escape Room</h1>
        
        <!-- Maze Area -->
        <div id="maze-container">
            <div id="runner">🏃‍♂️</div>
        </div>

        <!-- Question Area -->
        <div id="riddle-box">
            <h2 id="riddle-number">Riddle 1</h2>
            <p id="riddle-text">Loading riddle...</p>
            <div id="options-container"></div>
        </div>
    </div>

    <!-- Win Screen (Fixed: No Heartbreak) -->
    <div id="win-screen" class="hidden">
        <h1>Victory! 🏆</h1>
        <p>You mastered all 20 riddles!</p>
        <p>Developer: Kareem Aladham (8A)<br>Teacher: Hiba Hilal</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <!-- Lose Screen -->
    <div id="lose-screen" class="hidden">
        <h1>Hard Luck! 💔</h1>
        <p>One wrong move ended the escape.</p>
        <button onclick="location.reload()">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
