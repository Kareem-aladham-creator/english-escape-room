<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@600&display=swap" rel="stylesheet">
</head>
<body>

    <div id="game-container">
        <!-- Floating Background Words -->
        <div class="bg-word" style="top: 10%; left: 5%;">Grammar</div>
        <div class="bg-word" style="top: 20%; right: 10%;">Verb</div>
        <div class="bg-word" style="top: 50%; left: 8%;">ABC</div>
        <div class="bg-word" style="bottom: 15%; right: 5%;">Noun</div>
        <div class="bg-word" style="bottom: 10%; left: 15%;">Tense</div>

        <h1 class="bubble-font floating-words">English Escape Room</h1>
        
        <div id="maze-container">
            <svg id="maze-svg" viewBox="0 0 100 100">
                <path d="M 5 5 L 5 40 L 40 40 L 40 70 L 80 70 L 80 95" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" />
            </svg>
            <div id="character">🏃‍♂️</div>
        </div>

        <div id="quiz-box">
            <h2 id="riddle-title" class="bubble-font floating-words">Riddle 1</h2>
            <p id="question-text">Loading...</p>
            <div id="options-container"></div>
        </div>
    </div>

    <!-- WIN SCREEN: SPREAD ACROSS LEFT, MIDDLE, RIGHT -->
    <div id="win-screen" class="hidden fullscreen">
        <div class="firework" style="left: 5%;">🎆</div>
        <div class="firework" style="left: 15%;">✨</div>
        <div class="firework" style="left: 25%;">🎉</div>
        <div class="firework" style="left: 35%;">🎇</div>
        <div class="firework" style="left: 50%;">🎊</div>
        <div class="firework" style="left: 65%;">🎆</div>
        <div class="firework" style="left: 75%;">✨</div>
        <div class="firework" style="left: 85%;">🎉</div>
        <div class="firework" style="left: 95%;">🎇</div>
        
        <h1 class="big-win bubble-font floating-words">Winner 🎉🥇</h1>
        <button class="modern-btn" onclick="resetGame()">Play Again</button>
        <div class="credits">
            <p>Made by Kareem Aladham</p>
            <p>Teacher Hiba Hilal</p>
            <p>8A</p>
        </div>
    </div>

    <!-- LOSE SCREEN: SPREAD ACROSS LEFT, MIDDLE, RIGHT -->
    <div id="lose-screen" class="hidden fullscreen bg-red">
        <div class="heartbreak" style="left: 5%;">💔</div>
        <div class="heartbreak" style="left: 20%;">😭</div>
        <div class="heartbreak" style="left: 40%;">💔</div>
        <div class="heartbreak" style="left: 60%;">⛈️</div>
        <div class="heartbreak" style="left: 80%;">💔</div>
        <div class="heartbreak" style="left: 95%;">😭</div>

        <h1 class="bubble-font floating-words">Hard Luck 💔</h1>
        <button class="modern-btn" onclick="resetGame()">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
