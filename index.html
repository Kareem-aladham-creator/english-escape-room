<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Balanced Floating Words -->
    <div class="floating-container">
        <div class="side-left">
            <span class="f-word">Grammar</span>
            <span class="f-word">ABC</span>
            <span class="f-word">Tense</span>
        </div>
        <div class="side-right">
            <span class="f-word">Verb</span>
            <span class="f-word">Noun</span>
            <span class="f-word">Phrase</span>
        </div>
    </div>

    <div id="game-container">
        <h1 class="title">English Escape Room</h1>
        
        <div id="maze-area">
            <div id="player-icon">🏃‍♂️</div>
        </div>

        <div id="quiz-box">
            <h2 id="riddle-count">Riddle 1</h2>
            <p id="riddle-text">Loading...</p>
            <div id="option-buttons"></div>
        </div>
    </div>

    <!-- Win Screen: 🏆 ONLY -->
    <div id="win-screen" class="end-screen hidden">
        <h1>Victory! 🏆</h1>
        <p>You mastered all 20 riddles!</p>
        <div class="credits">
            <p>Made by Kareem Aladham</p>
            <p>Class 8A - Teacher Hiba Hilal</p>
        </div>
        <button class="reset-btn" onclick="location.reload()">Play Again</button>
    </div>

    <!-- Lose Screen: 💔 ONLY -->
    <div id="lose-screen" class="end-screen hidden">
        <h1>Hard Luck 💔</h1>
        <p>One mistake ended the escape!</p>
        <button class="reset-btn" onclick="location.reload()">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
