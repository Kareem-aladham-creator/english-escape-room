<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Balanced Floating Words -->
    <div class="floating-container">
        <div class="float-column float-left">
            <span class="f-word w1">Grammar</span>
            <span class="f-word w2">ABC</span>
            <span class="f-word w3">Tense</span>
        </div>
        <div class="float-column float-right">
            <span class="f-word w4">Verb</span>
            <span class="f-word w5">Noun</span>
            <span class="f-word w6">Phrase</span>
        </div>
    </div>

    <div id="game-wrapper">
        <h1 class="project-title">English Escape Room</h1>
        
        <div id="maze-container">
            <div id="runner">🏃‍♂️</div>
        </div>

        <div id="riddle-box">
            <h2 id="riddle-number">Riddle 1</h2>
            <p id="riddle-text">Loading...</p>
            <div id="options-group"></div>
        </div>
    </div>

    <!-- Win Screen (Fixed: No Heartbreak) -->
    <div id="victory-panel" class="overlay hidden">
        <h1>Victory! 🏆</h1>
        <p>You mastered all 20 riddles!</p>
        <div class="project-credits">
            <p>Made by Kareem Aladham</p>
            <p>Class 8A - Teacher Hiba Hilal</p>
        </div>
        <button class="menu-btn" onclick="location.reload()">Play Again</button>
    </div>

    <!-- Lose Screen (💔 ONLY) -->
    <div id="lose-panel" class="overlay hidden">
        <h1>Hard Luck 💔</h1>
        <p>One wrong move door locked!</p>
        <button class="menu-btn" onclick="location.reload()">Try Again</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
