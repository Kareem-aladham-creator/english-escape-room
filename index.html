<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-fx">
        <div class="side-l"><span class="float">Grammar</span><span class="float">ABC</span></div>
        <div class="side-r"><span class="float">Verb</span><span class="float">Noun</span></div>
    </div>

    <div id="game-container">
        <h1 class="title">English Escape Room</h1>
        <div id="riddle-box">
            <h2 id="r-count">Riddle 1</h2>
            <p id="question">Loading...</p>
            <div id="options"></div>
        </div>
    </div>

    <!-- Victory Screen: No Heartbreak 💔 -->
    <div id="win-screen" class="modal hidden">
        <h1>Victory! 🏆</h1>
        <p>You completed all 20 riddles!</p>
        <div class="credits">
            <p>Made by Kareem Aladham</p>
            <p>Class 8A - Teacher Hiba Hilal</p>
        </div>
        <button class="re-btn" onclick="location.reload()">Play Again</button>
    </div>

    <div id="fail-screen" class="modal hidden">
        <h1>Try Again 💔</h1>
        <button class="re-btn" onclick="location.reload()">Restart</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
