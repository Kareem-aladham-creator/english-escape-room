<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Escape Room - Hard Mode</title>
    <style>
        body {
            background-color: #001122;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            transition: background-color 0.3s; /* For the Red/Green flash */
        }

        .maze-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
            background-color: #002244;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            max-width: 300px; 
            border: 3px solid #0055ff;
        }

        .maze-cell {
            aspect-ratio: 1; 
            background-color: #004488; 
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .maze-cell.active { background-color: #3399ff; box-shadow: 0 0 15px #3399ff; }

        #game-container {
            background-color: #002244;
            border: 2px solid #0055ff;
            border-radius: 15px;
            padding: 20px;
            max-width: 500px;
            width: 100%;
        }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        button {
            background-color: #004488;
            color: white;
            border: 2px solid #0055ff;
            border-radius: 8px;
            padding: 20px;
            font-size: 18px;
            cursor: pointer;
        }

        .heartbreak {
            position: fixed; top: 50%; left: 50%; font-size: 100px;
            transform: translate(-50%, -50%); animation: break 1s forwards;
        }
        @keyframes break { 0% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -100%); } }

        .firework { position: fixed; font-size: 50px; animation: explode 1.5s forwards; }
        @keyframes explode { 0% { opacity: 1; } 100% { opacity: 0; transform: scale(3); } }
    </style>
</head>
<body>

    <h1>English Escape Room: 8A Edition</h1>
    <div class="maze-board" id="maze-board"></div>

    <div id="game-container">
        <div id="question-text" style="font-size: 20px; margin-bottom: 20px;">Loading...</div>
        <div id="options-container" class="options"></div>
        <div style="margin-top: 20px; color: #ff4444; font-weight: bold;" id="lives-display">Life: ❤️</div>
    </div>

    <div id="end-screen" style="display:none;">
        <h2 id="end-title"></h2>
        <button onclick="location.reload()">RETRY</button>
    </div>

    <div style="margin-top: 20px; opacity: 0.6;">Made by Kareem Aladham | Teacher Hiba Hilal</div>

    <script>
        // THE OLD QUESTIONS (2-OPTION VERSION)
        const questions = [
            { q: "Which is a 'Noun'?", options: ["Run", "Apple"], answer: 1 },
            { q: "Past tense of 'Go'?", options: ["Went", "Gone"], answer: 0 },
            { q: "I have an eye but cannot see. What am I?", options: ["Needle", "Table"], answer: 0 },
            { q: "Which one is plural?", options: ["Child", "Children"], answer: 1 },
            { q: "Opposite of 'Difficult'?", options: ["Easy", "Soft"], answer: 0 },
            { q: "A person who teaches is a...", options: ["Student", "Teacher"], answer: 1 },
            { q: "What comes at the end of a sentence?", options: ["Comma", "Full stop"], answer: 1 },
            { q: "Which is a color?", options: ["Blue", "Blow"], answer: 0 },
            { q: "The day after Friday is...", options: ["Saturday", "Sunday"], answer: 0 },
            { q: "Which is a fruit?", options: ["Carrot", "Orange"], answer: 1 },
            { q: "I have keys but no locks. What am I?", options: ["Piano", "Door"], answer: 0 },
            { q: "Capital of England?", options: ["Paris", "London"], answer: 1 },
            { q: "A 'Verb' is an...", options: ["Action", "Object"], answer: 0 },
            { q: "Which is 'Bigger'?", options: ["Ant", "Elephant"], answer: 1 },
            { q: "Opposite of 'Hot'?", options: ["Cold", "Warm"], answer: 0 },
            { q: "I speak without a mouth. What am I?", options: ["Echo", "Wind"], answer: 0 },
            { q: "Which month has 'Christmas'?", options: ["November", "December"], answer: 1 },
            { q: "How many letters in 'English'?", options: ["7", "8"], answer: 0 },
            { q: "Which is a 'Vowel'?", options: ["B", "E"], answer: 1 },
            { q: "You use me to write on a board. What am I?", options: ["Chalk", "Spoon"], answer: 0 }
        ];

        let current = 0;
        const mazePath = [0,1,2,3,4,9,8,7,6,5,10,11,12,13,14,19,18,17,16,15];
        const cells = [];
        const board = document.getElementById('maze-board');

        // Build Maze
        for(let i=0; i<20; i++) {
            const c = document.createElement('div');
            c.classList.add('maze-cell');
            board.appendChild(c);
            cells.push(c);
        }

        function playSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);
            
            if(type === 'correct') {
                osc.frequency.value = 880; // High beep
                document.body.style.backgroundColor = "#004400"; // Green Flash
            } else {
                osc.frequency.value = 110; // Low buzz
                document.body.style.backgroundColor = "#440000"; // Red Flash
            }
            
            osc.start();
            setTimeout(() => { 
                osc.stop(); 
                document.body.style.backgroundColor = "#001122"; 
            }, 200);
        }

        function showEffect(emoji, cls) {
            const el = document.createElement('div');
            el.innerText = emoji;
            el.className = cls;
            if(cls === 'firework') {
                el.style.left = Math.random() * 90 + '%';
                el.style.top = Math.random() * 90 + '%';
            }
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        function update() {
            if(current >= 20) {
                document.getElementById('game-container').style.display = 'none';
                document.getElementById('end-screen').style.display = 'block';
                document.getElementById('end-title').innerText = "🏆 YOU ESCAPED!";
                for(let i=0; i<20; i++) setTimeout(() => showEffect('🎆', 'firework'), i*100);
                return;
            }

            cells.forEach(c => { c.innerHTML = ''; c.classList.remove('active'); });
            cells[mazePath[19]].innerHTML = '🏁';
            cells[mazePath[current]].classList.add('active');
            cells[mazePath[current]].innerHTML = '🏃‍♂️';

            const q = questions[current];
            document.getElementById('question-text').innerText = q.q;
            const btnBox = document.getElementById('options-container');
            btnBox.innerHTML = '';
            
            q.options.forEach((opt, idx) => {
                const b = document.createElement('button');
                b.innerText = opt;
                b.onclick = () => {
                    if(idx === q.answer) {
                        playSound('correct');
                        current++;
                        update();
                    } else {
                        playSound('wrong');
                        showEffect('💔', 'heartbreak');
                        document.getElementById('game-container').style.display = 'none';
                        document.getElementById('end-screen').style.display = 'block';
                        document.getElementById('end-title').innerText = "💀 GAME OVER";
                    }
                };
                btnBox.appendChild(b);
            });
        }

        update();
    </script>
</body>
</html>
